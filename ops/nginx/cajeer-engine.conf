server {
    listen 80;
    server_name cajeer.ru www.cajeer.ru;

    root /www/wwwroot/cajeer.ru/public;
    index index.php index.html;

    charset utf-8;
    client_max_body_size 64m;

    access_log /www/wwwlogs/cajeer.ru.access.log;
    error_log  /www/wwwlogs/cajeer.ru.error.log;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_pass unix:/tmp/php-cgi-82.sock;
        fastcgi_read_timeout 120;
    }

    location ~* \.(?:css|js|jpg|jpeg|gif|png|svg|webp|ico|woff2?)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    location ~ /(?:\.env|composer\.(?:json|lock)|README\.md|storage|config|database|core|modules|compatibility|routes|resources)/ {
        deny all;
    }
}
